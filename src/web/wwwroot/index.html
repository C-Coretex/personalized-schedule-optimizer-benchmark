<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule Optimizer</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/forms.css" />
  <link rel="stylesheet" href="css/items.css" />
  <link rel="stylesheet" href="css/panels.css" />
  <link rel="stylesheet" href="css/calendar.css" />
</head>
<body>
  <main>
    <h1>Schedule Optimizer</h1>
    <div id="calendar-section" class="hidden">
      <div class="cal-panel card">
        <div class="section-header">
          <h2>Schedule Preview</h2>
          <span id="cal-optimizer-label" class="cal-optimizer-label hidden"></span>
          <div id="cal-score" class="cal-score hidden"></div>
          <button id="cal-fullscreen-btn" class="cal-fullscreen-btn" title="Toggle full-window view" aria-label="Toggle full-window view">
            <svg id="cal-fs-expand-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            <svg id="cal-fs-collapse-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
          </button>
        </div>
        <div id="cal-legend" class="cal-legend"></div>
        <div class="cal-scroll-wrapper">
          <div class="cal-header-row" id="cal-header-row"></div>
          <div class="cal-body" id="cal-body"></div>
        </div>
        <div id="cal-unscheduled" class="cal-unscheduled hidden"></div>
      </div>
    </div>

    <div class="layout">

      <div class="form-panel">

        <div class="submit-row">
          <button type="button" id="submit-btn" class="btn-primary">Generate Schedule</button>
          <button type="button" id="clear-btn" class="btn-secondary">Clear</button>
        </div>

        <div id="history-banner" class="hidden"></div>

        <div id="response-output"></div>

        <section class="card">
          <h2>Planning Horizon</h2>
          <div class="row">
            <label>Start Date
              <input type="date" id="horizon-start" required />
            </label>
            <label>End Date
              <input type="date" id="horizon-end" required />
            </label>
          </div>
          <div class="row">
            <label>Optimization Time
              <div class="opt-time-row">
                <input type="range" id="opt-time" min="1" max="300" value="15" />
                <input type="number" id="opt-time-value" class="opt-time-number" min="1" max="300" value="15" />
                <span class="opt-time-unit">s</span>
                <button type="button" id="opt-time-reset" class="btn-opt-reset" title="Reset to auto-calculated default">Auto</button>
              </div>
            </label>
          </div>
          <div class="row">
            <label>Optimizer
              <select id="optimizer-select">
                <option value="Specialized">Specialized</option>
                <option value="OrTools">OR-Tools</option>
                <option value="Timefold">Timefold</option>
              </select>
            </label>
          </div>
        </section>

        <section class="card">
          <h2>Difficult Task Scheduling Strategy</h2>
          <div class="row">
            <label>Strategy
              <select id="strategy">
                <option value="Cluster">Cluster — group hard tasks together</option>
                <option value="Even">Even — spread tasks evenly across the day</option>
              </select>
            </label>
          </div>
        </section>

        <section class="card">
          <div class="section-header">
            <h2>Fixed Tasks</h2>
            <button type="button" id="add-fixed-task" class="btn-add">+ Add</button>
          </div>
          <div id="fixed-tasks-list"></div>
        </section>

        <section class="card">
          <div class="section-header">
            <h2>Dynamic Tasks</h2>
            <button type="button" id="add-dynamic-task" class="btn-add">+ Add</button>
          </div>
          <div id="dynamic-tasks-list"></div>
        </section>

        <section class="card">
          <div class="section-header">
            <h2>Category Windows</h2>
            <button type="button" id="add-category-window" class="btn-add">+ Add</button>
          </div>
          <div id="category-windows-list"></div>
        </section>

        <section class="card">
          <div class="section-header">
            <h2>Difficulty Capacities</h2>
            <button type="button" id="add-difficulty-capacity" class="btn-add">+ Add</button>
          </div>
          <div id="difficulty-capacities-list"></div>
        </section>

        <section class="card">
          <div class="section-header">
            <h2>Task Type Preferences</h2>
            <button type="button" id="add-type-preference" class="btn-add">+ Add</button>
          </div>
          <div id="type-preferences-list"></div>
        </section>


        <section class="card" id="api-schema-card">
          <details id="api-schema-details">
            <summary>
              <div class="section-header schema-header">
                <h2>API Schema</h2>
                <div class="schema-btn-group">
                  <button type="button" id="load-sample-week-heavy-btn" class="btn-secondary">Load Sample — Week Heavy</button>
                  <button type="button" id="load-sample-month-light-btn" class="btn-secondary">Month Light</button>
                  <button type="button" id="load-sample-month-heavy-btn" class="btn-secondary">Month Heavy</button>
                  <button type="button" id="copy-schema-btn" class="btn-secondary">Copy Schema</button>
                  <select id="copy-prompt-variant" class="prompt-variant-select">
                    <option value="week-light">Week · Light</option>
                    <option value="week-heavy">Week · Heavy</option>
                    <option value="month-light">Month · Light</option>
                    <option value="month-heavy">Month · Heavy</option>
                  </select>
                  <button type="button" id="copy-prompt-btn" class="btn-secondary">Copy Prompt</button>
                </div>
              </div>
            </summary>
            <pre id="schema-pre" class="schema-pre">Loading…</pre>
          </details>
        </section>

      </div>

      <div class="json-panel">
        <div class="section-header">
          <h2>JSON Payload</h2>
        </div>
        <textarea id="json-preview" spellcheck="false"></textarea>
      </div>

      <div class="ids-panel">
        <div class="section-header">
          <h2>Generated Schedules</h2>
          <button type="button" id="refresh-ids-btn" class="btn-add" title="Refresh">&#8635;</button>
        </div>
        <ul id="generated-ids-list" class="ids-list">
          <li class="ids-empty">No schedules generated yet.</li>
        </ul>
      </div>

    </div>

    <div id="cal-tooltip" class="cal-tooltip"></div>

  </main>
  <script type="module" src="js/main.js"></script>
</body>
</html>
