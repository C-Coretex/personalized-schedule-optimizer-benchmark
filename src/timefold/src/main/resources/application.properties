server.port=8080
callbacks.schedule-submit-url=${CALLBACKS_SCHEDULE_SUBMIT_URL:}
internal-api.shared-secret=${INTERNAL_API_SHARED_SECRET:}
spring.task.execution.pool.max-size=10

# Timefold solver termination (fallback; per-job time is set from optimizationTimeInSeconds)
timefold.solver.termination.spent-limit=15s

# Jackson: ISO date strings, tolerate unknown fields from web models
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
